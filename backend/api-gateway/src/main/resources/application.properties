spring.application.name=api-gateway

server.port=8080

eureka.client.enabled=false

spring.cloud.discovery.enabled=false

# AUTH SERVICE

spring.cloud.gateway.mvc.routes[0].id=auth-service

spring.cloud.gateway.mvc.routes[0].uri=http://localhost:8081

spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**

# PATIENT SERVICE

spring.cloud.gateway.mvc.routes[1].id=patient-service

spring.cloud.gateway.mvc.routes[1].uri=http://localhost:8082

spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/patients/**

# DOCTOR SERVICE

spring.cloud.gateway.mvc.routes[2].id=doctor-service

spring.cloud.gateway.mvc.routes[2].uri=http://localhost:8083

spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/doctors/**

spring.cloud.gateway.mvc.routes[3].id=appointment-service

spring.cloud.gateway.mvc.routes[3].uri=http://localhost:8084

spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/appointments/**

spring.cloud.gateway.mvc.routes[4].id=ai-service

spring.cloud.gateway.mvc.routes[4].uri=http://localhost:8085

spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/api/ai/**