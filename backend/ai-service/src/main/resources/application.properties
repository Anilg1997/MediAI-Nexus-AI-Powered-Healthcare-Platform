spring.application.name=ai-service

server.port=8092

# Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.embedding.options.model=nomic-embed-text

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=ai-group
spring.kafka.consumer.auto-offset-reset=earliest

# PostgreSQL with pgvector
spring.datasource.url=jdbc:postgresql://localhost:5432/aihealthcare
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring AI Vector Store (pgvector)
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# LangChain4j Configuration
langchain4j.ollama.base-url=http://localhost:11434
langchain4j.ollama.chat-model-name=llama3.2
langchain4j.ollama.embedding-model-name=nomic-embed-text
langchain4j.ollama.timeout=60s

# MCP Server Configuration
langchain4j.mcp.server.enabled=true
langchain4j.mcp.server.port=8093
langchain4j.mcp.server.transport=STDIO