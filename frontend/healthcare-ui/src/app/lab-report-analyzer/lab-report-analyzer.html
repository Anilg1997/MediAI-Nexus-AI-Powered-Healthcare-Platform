<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header bg-danger text-white">

      <h3>Lab Report Analyzer</h3>

    </div>

    <div class="card-body">

      <textarea
        class="form-control"
        rows="10"
        [(ngModel)]="report">
      </textarea>

      <button
        class="btn btn-danger mt-3"
        (click)="analyze()">

        Analyze Report

      </button>

    </div>

  </div>

  <div *ngIf="loading"
       class="alert alert-info mt-3">

    AI is analyzing report...

  </div>

  <div *ngIf="result"
       class="card mt-4">

    <div class="card-header bg-success text-white">

      Analysis Result

    </div>

    <div class="card-body">

      <pre>{{result}}</pre>

    </div>

  </div>

</div>
