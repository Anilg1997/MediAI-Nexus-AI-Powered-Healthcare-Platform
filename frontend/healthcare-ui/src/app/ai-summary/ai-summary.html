<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header bg-primary text-white">

      <h3>
        Medical Report Summarizer
      </h3>

    </div>

    <div class="card-body">

      <div class="mb-3">

        <label class="form-label">

          Medical Report

        </label>

        <textarea
          class="form-control"
          rows="10"
          [(ngModel)]="report">
        </textarea>

      </div>

      <button
        class="btn btn-success"
        (click)="summarize()">

        Summarize Report

      </button>

    </div>

  </div>

  <div
    *ngIf="loading"
    class="mt-3">

    <div class="alert alert-info">

      Generating Summary...

    </div>

  </div>

  <div
    *ngIf="summary"
    class="card mt-4 shadow">

    <div class="card-header bg-success text-white">

      AI Summary

    </div>

    <div class="card-body">

      <pre>{{summary}}</pre>

    </div>

  </div>

</div>
