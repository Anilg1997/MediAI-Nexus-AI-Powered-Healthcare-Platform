<div class="container mt-4">

  <h2 class="mb-4 text-success">

    Doctor Management

  </h2>

  <div class="card shadow p-4">

    <form (ngSubmit)="addDoctor()">

      <div class="row">

        <div class="col-md-6 mb-3">

          <input
            type="text"

            class="form-control"

            placeholder="Doctor Name"

            [(ngModel)]="doctor.name"

            name="name">

        </div>

        <div class="col-md-6 mb-3">

          <input
            type="text"

            class="form-control"

            placeholder="Specialization"

            [(ngModel)]="doctor.specialization"

            name="specialization">

        </div>

        <div class="col-md-6 mb-3">

          <input
            type="number"

            class="form-control"

            placeholder="Experience"

            [(ngModel)]="doctor.experience"

            name="experience">

        </div>

        <div class="col-md-6 mb-3">

          <input
            type="email"

            class="form-control"

            placeholder="Email"

            [(ngModel)]="doctor.email"

            name="email">

        </div>

      </div>

      <button
        class="btn btn-success">

        {{ editMode ? 'Update Doctor' : 'Add Doctor' }}

      </button>

    </form>

  </div>

  <div class="card shadow mt-5 p-4">

    <h3>Doctors List</h3>

    <table class="table table-bordered table-hover mt-3">

      <thead class="table-dark">

        <tr>

          <th>ID</th>

          <th>Name</th>

          <th>Specialization</th>

          <th>Experience</th>

          <th>Email</th>

          <th>Actions</th>

        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let d of doctors">

          <td>{{ d.id }}</td>

          <td>{{ d.name }}</td>

          <td>{{ d.specialization }}</td>

          <td>{{ d.experience }}</td>

          <td>{{ d.email }}</td>

          <td>

            <button

              class="btn btn-primary btn-sm me-2"

              (click)="editDoctor(d)">

              Edit

            </button>

            <button

              class="btn btn-danger btn-sm"

              (click)="deleteDoctor(d.id)">

              Delete

            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
