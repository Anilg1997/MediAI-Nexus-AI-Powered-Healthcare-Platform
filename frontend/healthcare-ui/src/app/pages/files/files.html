<div class="container mt-4">

  <h2 class="text-primary mb-4">

    Medical File Management

  </h2>

  <div class="card shadow p-4">

    <div class="row">

      <div class="col-md-6 mb-3">

        <input
          type="number"

          class="form-control"

          placeholder="Patient ID"

          [(ngModel)]="patientId">

      </div>

      <div class="col-md-6 mb-3">

        <input
          type="file"

          class="form-control"

          (change)="onFileSelected($event)">

      </div>

    </div>

    <button
      class="btn btn-primary"

      (click)="uploadFile()">

      Upload File

    </button>

  </div>

  <div class="card shadow mt-5 p-4">

    <h3>Uploaded Files</h3>

    <table
      class="table table-bordered table-hover mt-3">

      <thead class="table-dark">

        <tr>

          <th>ID</th>

          <th>Patient ID</th>

          <th>File Name</th>

          <th>File Type</th>

          <th>Upload Date</th>

        </tr>

      </thead>

      <tbody>

        <tr
          *ngFor="
            let f of files">

          <td>{{ f.id }}</td>

          <td>{{ f.patientId }}</td>

          <td>{{ f.fileName }}</td>

          <td>{{ f.fileType }}</td>

          <td>{{ f.uploadedDate }}</td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
