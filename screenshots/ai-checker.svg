<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI','Inter',sans-serif">
  <defs><filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/></filter></defs>
  <rect width="1100" height="750" fill="#f8f9fa"/>
  <rect width="1100" height="56" fill="#212529"/>
  <text x="24" y="36" fill="white" font-size="20" font-weight="700">🏥 AI Healthcare</text>
  <!-- AI Symptom Checker -->
  <rect x="40" y="80" rx="12" ry="12" width="500" height="340" fill="white" filter="url(#shadow)"/>
  <text x="60" y="118" fill="#0d6efd" font-size="20" font-weight="700">🤖 AI Symptom Checker</text>
  <text x="60" y="144" fill="#6c757d" font-size="13">Describe your symptoms below and get AI-powered guidance.</text>
  <!-- Textarea -->
  <rect x="60" y="164" rx="6" ry="6" width="460" height="100" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="76" y="188" fill="#6c757d" font-size="12">Enter symptoms...</text>
  <text x="76" y="210" fill="#212529" font-size="13">I have been experiencing severe headaches with</text>
  <text x="76" y="228" fill="#212529" font-size="13">nausea and dizziness for the past 3 days. I also</text>
  <text x="76" y="246" fill="#212529" font-size="13">have sensitivity to light.</text>
  <rect x="60" y="276" rx="6" ry="6" width="160" height="40" fill="#0d6efd"/>
  <text x="140" y="302" fill="white" font-size="14" text-anchor="middle" font-weight="500">Analyze Symptoms</text>
  <!-- Results -->
  <rect x="580" y="80" rx="12" ry="12" width="480" height="340" fill="white" filter="url(#shadow)"/>
  <text x="600" y="118" fill="#198754" font-size="20" font-weight="700">📋 Analysis Results</text>
  <text x="600" y="150" fill="#212529" font-size="14" font-weight="600">Possible Diseases:</text>
  <rect x="600" y="162" rx="6" ry="6" width="440" height="36" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="616" y="186" fill="#856404" font-size="13">• Migraine with Aura</text>
  <rect x="600" y="204" rx="6" ry="6" width="440" height="36" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="616" y="228" fill="#856404" font-size="13">• Tension Headache</text>
  <rect x="600" y="246" rx="6" ry="6" width="440" height="36" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="616" y="270" fill="#856404" font-size="13">• Sinusitis</text>
  <text x="600" y="306" fill="#212529" font-size="14" font-weight="600">Recommended Doctor:</text>
  <rect x="600" y="316" rx="6" ry="6" width="200" height="30" fill="#dc3545"/>
  <text x="700" y="337" fill="white" font-size="13" text-anchor="middle" font-weight="500">Neurologist</text>
  <!-- Footer note -->
  <text x="40" y="450" fill="#6c757d" font-size="12">⚠️ This is for informational purposes only. Always consult a healthcare professional for medical advice.</text>
</svg>
