<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI','Inter',sans-serif">
  <defs><filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/></filter></defs>
  <rect width="1100" height="750" fill="#f8f9fa"/>
  <rect width="1100" height="56" fill="#212529"/>
  <text x="24" y="36" fill="white" font-size="20" font-weight="700">🏥 AI Healthcare</text>
  <rect x="920" y="14" rx="6" ry="6" width="70" height="28" fill="#6c757d"/>
  <text x="955" y="33" fill="white" font-size="13" text-anchor="middle">Login</text>
  <rect x="998" y="14" rx="6" ry="6" width="80" height="28" fill="#198754"/>
  <text x="1038" y="33" fill="white" font-size="13" text-anchor="middle" font-weight="500">Register</text>

  <rect x="320" y="80" rx="12" ry="12" width="460" height="520" fill="white" filter="url(#shadow)"/>
  <text x="550" y="126" fill="#198754" font-size="24" font-weight="700" text-anchor="middle">📝 Create Account</text>
  <text x="550" y="148" fill="#6c757d" font-size="13" text-anchor="middle">Register for the AI Healthcare Platform</text>

  <!-- Username -->
  <rect x="348" y="172" rx="8" ry="8" width="416" height="48" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="364" y="188" fill="#6c757d" font-size="11">Enter Username</text>
  <text x="364" y="208" fill="#212529" font-size="14">anil_kumar</text>

  <!-- Email -->
  <rect x="348" y="232" rx="8" ry="8" width="416" height="48" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="364" y="248" fill="#6c757d" font-size="11">Enter Email</text>
  <text x="364" y="268" fill="#212529" font-size="14">anil@healthcare.com</text>

  <!-- Password -->
  <rect x="348" y="292" rx="8" ry="8" width="416" height="48" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="364" y="308" fill="#6c757d" font-size="11">Enter Password</text>
  <text x="364" y="328" fill="#212529" font-size="14">••••••••</text>

  <!-- Register button -->
  <rect x="348" y="360" rx="8" ry="8" width="416" height="44" fill="#198754"/>
  <text x="556" y="388" fill="white" font-size="15" font-weight="600" text-anchor="middle">Register</text>

  <text x="550" y="440" fill="#6c757d" font-size="13" text-anchor="middle">Already have an account?</text>
  <text x="550" y="464" fill="#0d6efd" font-size="13" font-weight="600" text-anchor="middle" text-decoration="underline">Login</text>
</svg>
