<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8"/><stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/></filter>
    <filter id="shadowLight"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="35" fill="#1e293b" font-size="22" font-weight="700" text-anchor="middle">MediAI Nexus — Low Level Design (LLD)</text>
  <line x1="200" y1="48" x2="1000" y2="48" stroke="#cbd5e1" stroke-width="1"/>

  <!-- ============ SECTION 1: Auth Flow ============ -->
  <rect x="40" y="62" rx="10" ry="10" width="360" height="240" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="40" y="62" rx="10" ry="10" width="360" height="32" fill="url(#primaryGrad)"/>
  <text x="220" y="83" fill="white" font-size="13" font-weight="600" text-anchor="middle">🔐 1. Authentication Flow (JWT)</text>

  <!-- Steps -->
  <rect x="58" y="108" rx="6" ry="6" width="155" height="32" fill="url(#skyGrad)"/>
  <text x="135" y="128" fill="white" font-size="11" text-anchor="middle">① Login Request</text>

  <rect x="225" y="108" rx="6" ry="6" width="155" height="32" fill="url(#purpleGrad)"/>
  <text x="302" y="128" fill="white" font-size="11" text-anchor="middle">② Auth Service</text>

  <line x1="213" y1="124" x2="225" y2="124" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="58" y="158" rx="6" ry="6" width="155" height="32" fill="url(#greenGrad)"/>
  <text x="135" y="178" fill="white" font-size="11" text-anchor="middle">③ Validate Credentials</text>

  <rect x="225" y="158" rx="6" ry="6" width="155" height="32" fill="url(#amberGrad)"/>
  <text x="302" y="178" fill="white" font-size="11" text-anchor="middle">④ Generate JWT Token</text>

  <line x1="213" y1="174" x2="225" y2="174" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="58" y="208" rx="6" ry="6" width="155" height="32" fill="url(#redGrad)"/>
  <text x="135" y="228" fill="white" font-size="11" text-anchor="middle">⑤ Return JWT Token</text>

  <rect x="225" y="208" rx="6" ry="6" width="155" height="32" fill="url(#greenGrad)"/>
  <text x="302" y="228" fill="white" font-size="11" text-anchor="middle">⑥ Authorize Requests</text>

  <line x1="213" y1="224" x2="225" y2="224" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="58" y="265" fill="#64748b" font-size="10">Roles: Admin · Doctor · User | BCrypt · RBAC · Spring Security</text>

  <!-- ============ SECTION 2: RAG Flow ============ -->
  <rect x="420" y="62" rx="10" ry="10" width="360" height="240" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="420" y="62" rx="10" ry="10" width="360" height="32" fill="url(#purpleGrad)"/>
  <text x="600" y="83" fill="white" font-size="13" font-weight="600" text-anchor="middle">🔍 2. RAG Pipeline</text>

  <rect x="438" y="108" rx="6" ry="6" width="155" height="32" fill="url(#purpleGrad)"/>
  <text x="515" y="128" fill="white" font-size="11" text-anchor="middle">① User Query</text>

  <rect x="605" y="108" rx="6" ry="6" width="155" height="32" fill="url(#skyGrad)"/>
  <text x="682" y="128" fill="white" font-size="11" text-anchor="middle">② Embed Query</text>

  <line x1="593" y1="124" x2="605" y2="124" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="438" y="158" rx="6" ry="6" width="155" height="32" fill="url(#greenGrad)"/>
  <text x="515" y="178" fill="white" font-size="11" text-anchor="middle">③ Vector Search</text>

  <rect x="605" y="158" rx="6" ry="6" width="155" height="32" fill="url(#amberGrad)"/>
  <text x="682" y="178" fill="white" font-size="11" text-anchor="middle">④ Retrieve Docs</text>

  <line x1="593" y1="174" x2="605" y2="174" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="438" y="208" rx="6" ry="6" width="155" height="32" fill="url(#redGrad)"/>
  <text x="515" y="228" fill="white" font-size="11" text-anchor="middle">⑤ Augment Prompt</text>

  <rect x="605" y="208" rx="6" ry="6" width="155" height="32" fill="url(#primaryGrad)"/>
  <text x="682" y="228" fill="white" font-size="11" text-anchor="middle">⑥ Generate Answer</text>

  <line x1="593" y1="224" x2="605" y2="224" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="438" y="265" fill="#64748b" font-size="10">pgvector: cosine distance · HNSW index · 768 dimensions</text>

  <!-- ============ SECTION 3: Agentic AI Flow ============ -->
  <rect x="800" y="62" rx="10" ry="10" width="360" height="240" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="800" y="62" rx="10" ry="10" width="360" height="32" fill="url(#amberGrad)"/>
  <text x="980" y="83" fill="white" font-size="13" font-weight="600" text-anchor="middle">🧠 3. Agentic AI Workflow</text>

  <rect x="818" y="108" rx="6" ry="6" width="155" height="32" fill="url(#amberGrad)"/>
  <text x="895" y="128" fill="white" font-size="11" text-anchor="middle">① User Input</text>

  <rect x="985" y="108" rx="6" ry="6" width="155" height="32" fill="url(#purpleGrad)"/>
  <text x="1062" y="128" fill="white" font-size="11" text-anchor="middle">② Intent Analysis</text>

  <line x1="973" y1="124" x2="985" y2="124" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="818" y="158" rx="6" ry="6" width="155" height="32" fill="url(#skyGrad)"/>
  <text x="895" y="178" fill="white" font-size="11" text-anchor="middle">③ Tool Selection</text>

  <rect x="985" y="158" rx="6" ry="6" width="155" height="32" fill="url(#greenGrad)"/>
  <text x="1062" y="178" fill="white" font-size="11" text-anchor="middle">④ Execute Tools</text>

  <line x1="973" y1="174" x2="985" y2="174" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="818" y="208" rx="6" ry="6" width="155" height="32" fill="url(#redGrad)"/>
  <text x="895" y="228" fill="white" font-size="11" text-anchor="middle">⑤ Synthesize</text>

  <rect x="985" y="208" rx="6" ry="6" width="155" height="32" fill="url(#primaryGrad)"/>
  <text x="1062" y="228" fill="white" font-size="11" text-anchor="middle">⑥ Final Response</text>

  <line x1="973" y1="224" x2="985" y2="224" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="818" y="265" fill="#64748b" font-size="10">Tools: symptom · doctor · appointment · record · analyze</text>

  <!-- ============ SECTION 4: AI Service Class Diagram ============ -->
  <rect x="40" y="320" rx="10" ry="10" width="550" height="260" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="40" y="320" rx="10" ry="10" width="550" height="32" fill="url(#purpleGrad)"/>
  <text x="315" y="341" fill="white" font-size="13" font-weight="600" text-anchor="middle">📦 4. AI Service — Component Architecture</text>

  <!-- Component blocks -->
  <rect x="58" y="366" rx="6" ry="6" width="240" height="40" fill="url(#skyGrad)"/>
  <text x="178" y="386" fill="white" font-size="12" font-weight="600" text-anchor="middle">AIService (Chat · RAG · Analyze)</text>
  <text x="178" y="400" fill="#e0f2fe" font-size="9" text-anchor="middle">Central orchestration</text>

  <rect x="315" y="366" rx="6" ry="6" width="250" height="40" fill="url(#greenGrad)"/>
  <text x="440" y="386" fill="white" font-size="12" font-weight="600" text-anchor="middle">AgentService (Tool-based)</text>
  <text x="440" y="400" fill="#d1fae5" font-size="9" text-anchor="middle">HealthcareAgent + HealthcareTools</text>

  <rect x="58" y="418" rx="6" ry="6" width="240" height="40" fill="url(#amberGrad)"/>
  <text x="178" y="438" fill="white" font-size="12" font-weight="600" text-anchor="middle">EmbeddingService</text>
  <text x="178" y="452" fill="#fef3c7" font-size="9" text-anchor="middle">Text → Vector (768d)</text>

  <rect x="315" y="418" rx="6" ry="6" width="250" height="40" fill="url(#redGrad)"/>
  <text x="440" y="438" fill="white" font-size="12" font-weight="600" text-anchor="middle">VectorSearchService</text>
  <text x="440" y="452" fill="#fecaca" font-size="9" text-anchor="middle">pgvector similarity search</text>

  <rect x="58" y="470" rx="6" ry="6" width="240" height="40" fill="url(#primaryGrad)"/>
  <text x="178" y="490" fill="white" font-size="12" font-weight="600" text-anchor="middle">RetrievalService</text>
  <text x="178" y="504" fill="#c7d2fe" font-size="9" text-anchor="middle">Document retrieval & ranking</text>

  <rect x="315" y="470" rx="6" ry="6" width="250" height="40" fill="url(#purpleGrad)"/>
  <text x="440" y="490" fill="white" font-size="12" font-weight="600" text-anchor="middle">MedicalAgentOrchestrator</text>
  <text x="440" y="504" fill="#e9d5ff" font-size="9" text-anchor="middle">Multi-step reasoning</text>

  <!-- Arrow connections -->
  <line x1="298" y1="386" x2="315" y2="386" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="298" y1="440" x2="315" y2="440" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="58" y="522" rx="6" ry="6" width="507" height="40" fill="#1e293b"/>
  <text x="311" y="542" fill="white" font-size="11" text-anchor="middle">Controllers: AgentController · AIController · DocumentController</text>
  <text x="311" y="556" fill="#94a3b8" font-size="9" text-anchor="middle">REST endpoints: /api/ai/*  |  /api/agent/*  |  /api/documents/*</text>

  <!-- ============ SECTION 5: DB Schema ============ -->
  <rect x="610" y="320" rx="10" ry="10" width="550" height="260" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="610" y="320" rx="10" ry="10" width="550" height="32" fill="url(#greenGrad)"/>
  <text x="885" y="341" fill="white" font-size="13" font-weight="600" text-anchor="middle">🗃️ 5. Database Schema</text>

  <!-- DocumentData table -->
  <rect x="630" y="368" rx="6" ry="6" width="240" height="120" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="750" y="388" fill="#166534" font-size="12" font-weight="600" text-anchor="middle">📄 document_data</text>
  <line x1="630" y1="396" x2="870" y2="396" stroke="#bbf7d0" stroke-width="1"/>
  <text x="645" y="414" fill="#475569" font-size="11">id (BIGINT)  ⭐ PK</text>
  <text x="645" y="432" fill="#475569" font-size="11">content (TEXT)</text>
  <text x="645" y="450" fill="#475569" font-size="11">file_name (VARCHAR 255)</text>
  <text x="645" y="468" fill="#475569" font-size="11">created_at (TIMESTAMP)</text>

  <!-- Relationship arrow -->
  <line x1="870" y1="425" x2="895" y2="425" stroke="#475569" stroke-width="1.5"/>
  <text x="882" y="415" fill="#64748b" font-size="14">1</text>
  <line x1="898" y1="410" x2="898" y2="440" stroke="#475569" stroke-width="1.5"/>
  <text x="910" y="425" fill="#64748b" font-size="14">*</text>

  <!-- DocumentEmbedding table -->
  <rect x="910" y="368" rx="6" ry="6" width="230" height="140" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="1025" y="388" fill="#6b21a8" font-size="12" font-weight="600" text-anchor="middle">🔬 document_embedding</text>
  <line x1="910" y1="396" x2="1140" y2="396" stroke="#ddd6fe" stroke-width="1"/>
  <text x="925" y="414" fill="#475569" font-size="11">id (BIGINT)  ⭐ PK</text>
  <text x="925" y="432" fill="#475569" font-size="11">document_id (BIGINT) 🔑 FK</text>
  <text x="925" y="450" fill="#475569" font-size="11">content (TEXT)</text>
  <text x="925" y="468" fill="#475569" font-size="11">embedding (VECTOR 768) 🌟</text>
  <text x="925" y="486" fill="#475569" font-size="11">ivfflat_index (HNSW)</text>

  <!-- Index info -->
  <rect x="630" y="504" rx="6" ry="6" width="510" height="60" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="885" y="522" fill="#9a3412" font-size="12" font-weight="600" text-anchor="middle">Indexes & Performance</text>
  <text x="645" y="540" fill="#475569" font-size="10">• idx_document_embedding_vector (HNSW index on embedding column for fast ANN search)</text>
  <text x="645" y="556" fill="#475569" font-size="10">• Cosine distance used for similarity measurement</text>

  <!-- ============ SECTION 6: API Endpoints ============ -->
  <rect x="40" y="598" rx="10" ry="10" width="1120" height="130" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="40" y="598" rx="10" ry="10" width="1120" height="32" fill="url(#redGrad)"/>
  <text x="600" y="619" fill="white" font-size="13" font-weight="600" text-anchor="middle">🔌 6. Key API Endpoints</text>

  <!-- Endpoint rows -->
  <rect x="58" y="644" rx="4" ry="4" width="180" height="28" fill="#fee2e2"/>
  <text x="148" y="663" fill="#991b1b" font-size="11" font-weight="600" text-anchor="middle">POST /api/auth/login</text>

  <rect x="250" y="644" rx="4" ry="4" width="180" height="28" fill="#dbeafe"/>
  <text x="340" y="663" fill="#1e40af" font-size="11" font-weight="600" text-anchor="middle">GET/POST /api/patients</text>

  <rect x="442" y="644" rx="4" ry="4" width="180" height="28" fill="#dcfce7"/>
  <text x="532" y="663" fill="#166534" font-size="11" font-weight="600" text-anchor="middle">GET/POST /api/doctors</text>

  <rect x="634" y="644" rx="4" ry="4" width="180" height="28" fill="#fef3c7"/>
  <text x="724" y="663" fill="#92400e" font-size="11" font-weight="600" text-anchor="middle">POST /api/appointments</text>

  <rect x="826" y="644" rx="4" ry="4" width="180" height="28" fill="#f3e8ff"/>
  <text x="916" y="663" fill="#5b21b6" font-size="11" font-weight="600" text-anchor="middle">POST /api/prescriptions</text>

  <rect x="58" y="682" rx="4" ry="4" width="180" height="28" fill="#fce7f3"/>
  <text x="148" y="701" fill="#831843" font-size="11" font-weight="600" text-anchor="middle">GET /api/ai/chat</text>

  <rect x="250" y="682" rx="4" ry="4" width="180" height="28" fill="#e0f2fe"/>
  <text x="340" y="701" fill="#0c4a6e" font-size="11" font-weight="600" text-anchor="middle">POST /api/ai/symptom-checker</text>

  <rect x="442" y="682" rx="4" ry="4" width="180" height="28" fill="#d1fae5"/>
  <text x="532" y="701" fill="#065f46" font-size="11" font-weight="600" text-anchor="middle">POST /api/ai/summarize</text>

  <rect x="634" y="682" rx="4" ry="4" width="180" height="28" fill="#fef3c7"/>
  <text x="724" y="701" fill="#92400e" font-size="11" font-weight="600" text-anchor="middle">POST /api/agent/orchestrate</text>

  <rect x="826" y="682" rx="4" ry="4" width="180" height="28" fill="#e0f2fe"/>
  <text x="916" y="701" fill="#0c4a6e" font-size="11" font-weight="600" text-anchor="middle">POST /api/ai/rag-chat</text>

  <!-- ============ Footer ============ -->
  <rect x="40" y="748" rx="10" ry="10" width="1120" height="50" fill="#1e293b"/>
  <text x="600" y="770" fill="white" font-size="12" font-weight="600" text-anchor="middle">Spring Boot 3 · Java 21 · Angular 21 · PostgreSQL pgvector · Kafka · Ollama · LangChain4j · Docker</text>
  <text x="600" y="788" fill="#94a3b8" font-size="11" text-anchor="middle">Design Principles: SOLID · Microservices · Event-Driven · Separation of Concerns · API Gateway Pattern</text>

  <!-- Flow between sections -->
  <line x1="240" y1="302" x2="240" y2="320" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="302" x2="600" y2="320" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="960" y1="302" x2="960" y2="320" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="240" y="314" fill="#94a3b8" font-size="9" text-anchor="middle">Auth Config</text>
  <text x="600" y="314" fill="#94a3b8" font-size="9" text-anchor="middle">RAG Config</text>
  <text x="960" y="314" fill="#94a3b8" font-size="9" text-anchor="middle">Agent Config</text>

  <!-- Dimension markers -->
  <rect x="40" y="818" rx="4" ry="4" width="14" height="14" fill="url(#skyGrad)"/>
  <text x="60" y="830" fill="#475569" font-size="10">Request Flow</text>
  <rect x="180" y="818" rx="4" ry="4" width="14" height="14" fill="url(#purpleGrad)"/>
  <text x="200" y="830" fill="#475569" font-size="10">AI Components</text>
  <rect x="340" y="818" rx="4" ry="4" width="14" height="14" fill="url(#greenGrad)"/>
  <text x="360" y="830" fill="#475569" font-size="10">Data Layer</text>
  <rect x="500" y="818" rx="4" ry="4" width="14" height="14" fill="url(#amberGrad)"/>
  <text x="520" y="830" fill="#475569" font-size="10">Agentic AI</text>
</svg>