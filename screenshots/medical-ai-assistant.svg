<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="userMsgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d6efd"/><stop offset="100%" stop-color="#0a58ca"/>
    </linearGradient>
    <linearGradient id="aiMsgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1100" height="750" fill="#f8f9fa"/>

  <!-- Navbar -->
  <rect width="1100" height="56" fill="#212529"/>
  <text x="24" y="36" fill="white" font-size="20" font-weight="700">🏥 MediAI Nexus</text>
  <rect x="900" y="14" rx="4" ry="4" width="60" height="28" fill="#0d6efd"/><text x="930" y="33" fill="white" font-size="12" text-anchor="middle">Dashboard</text>
  <rect x="968" y="14" rx="4" ry="4" width="60" height="28" fill="#198754"/><text x="998" y="33" fill="white" font-size="12" text-anchor="middle">Profile</text>
  <rect x="1036" y="14" rx="4" ry="4" width="50" height="28" fill="#dc3545"/><text x="1061" y="33" fill="white" font-size="12" text-anchor="middle">Logout</text>

  <!-- Main content -->
  <rect x="30" y="72" rx="10" ry="10" width="1040" height="55" fill="white" filter="url(#shadow)"/>
  <text x="50" y="96" fill="#1e293b" font-size="20" font-weight="700">🤖 Medical AI Assistant (RAG-Powered)</text>
  <text x="50" y="116" fill="#64748b" font-size="12">Ask medical questions — AI retrieves knowledge from the medical database</text>

  <!-- Chat container -->
  <rect x="30" y="140" rx="10" ry="10" width="1040" height="410" fill="white" filter="url(#shadow)"/>

  <!-- Chat header -->
  <rect x="30" y="140" rx="10" ry="10" width="1040" height="50" fill="#faf5ff"/>
  <circle cx="60" cy="165" r="16" fill="url(#aiGrad)"/>
  <text x="60" y="170" fill="white" font-size="14" text-anchor="middle" font-weight="600">AI</text>
  <text x="85" y="162" fill="#6b21a8" font-size="14" font-weight="600">Medical AI Assistant</text>
  <text x="85" y="180" fill="#94a3b8" font-size="11">Knowledge Base: 1,200+ medical documents</text>

  <!-- Messages -->
  <!-- AI message 1 -->
  <rect x="60" y="205" rx="12" ry="12" width="500" height="60" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="78" y="228" fill="#475569" font-size="12">Hello! I'm your Medical AI Assistant.</text>
  <text x="78" y="248" fill="#64748b" font-size="11">I can answer questions based on the medical records</text>
  <text x="78" y="262" fill="#64748b" font-size="11">and knowledge base. How can I help you today?</text>

  <!-- User message -->
  <rect x="600" y="280" rx="12" ry="12" width="440" height="50" fill="url(#userMsgGrad)"/>
  <text x="618" y="302" fill="white" font-size="12">What is the recommended treatment for type 2</text>
  <text x="618" y="320" fill="white" font-size="12">diabetes according to our medical records?</text>

  <!-- AI message with RAG -->
  <rect x="60" y="345" rx="12" ry="12" width="700" height="130" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <rect x="60" y="345" rx="12" ry="12" width="700" height="22" fill="#e9d5ff"/>
  <text x="410" y="360" fill="#6b21a8" font-size="10" text-anchor="middle">🔍 Retrieved from Medical Knowledge Base</text>
  <text x="78" y="385" fill="#475569" font-size="12" font-weight="600">Treatment Plan for Type 2 Diabetes:</text>
  <text x="78" y="405" fill="#64748b" font-size="11">1. Lifestyle modifications: Diet control and regular exercise</text>
  <text x="78" y="422" fill="#64748b" font-size="11">2. First-line medication: Metformin 500-1000mg daily</text>
  <text x="78" y="439" fill="#64748b" font-size="11">3. Monitor HbA1c every 3 months (target: <7%)</text>
  <text x="78" y="456" fill="#64748b" font-size="11">4. Annual complication screening (eye, kidney, feet)</text>

  <!-- Knowledge Base indicator -->
  <rect x="60" y="490" rx="6" ry="6" width="200" height="28" fill="#f0fdf4"/>
  <text x="160" y="509" fill="#166534" font-size="11" text-anchor="middle">📚 Retrieved 3 relevant documents</text>
  <rect x="280" y="490" rx="6" ry="6" width="150" height="28" fill="#eff6ff"/>
  <text x="355" y="509" fill="#1e40af" font-size="11" text-anchor="middle">🎯 Accuracy: 96%</text>

  <!-- Input area -->
  <rect x="60" y="530" rx="8" ry="8" width="850" height="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="78" y="556" fill="#94a3b8" font-size="13">Ask a medical question based on our data...</text>

  <rect x="930" y="530" rx="8" ry="8" width="120" height="46" fill="url(#aiGrad)"/>
  <text x="990" y="557" fill="white" font-size="14" font-weight="600" text-anchor="middle">Send →</text>

  <!-- Info strip -->
  <rect x="30" y="570" rx="10" ry="10" width="1040" height="55" fill="white" filter="url(#shadow)"/>
  <text x="50" y="594" fill="#475569" font-size="12" font-weight="600">ℹ️ How RAG Works</text>
  <text x="50" y="612" fill="#64748b" font-size="11">Your question → Vector search in pgvector → Retrieve relevant medical documents → Augment AI prompt → Generate accurate answer grounded in your data</text>

  <!-- Stats -->
  <rect x="30" y="640" rx="8" ry="8" width="240" height="60" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="150" y="664" fill="#1e40af" font-size="16" font-weight="700" text-anchor="middle">1,247</text>
  <text x="150" y="682" fill="#3b82f6" font-size="11" text-anchor="middle">Medical Documents</text>

  <rect x="290" y="640" rx="8" ry="8" width="240" height="60" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="410" y="664" fill="#166534" font-size="16" font-weight="700" text-anchor="middle">768</text>
  <text x="410" y="682" fill="#22c55e" font-size="11" text-anchor="middle">Vector Dimensions</text>

  <rect x="550" y="640" rx="8" ry="8" width="240" height="60" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="670" y="664" fill="#92400e" font-size="16" font-weight="700" text-anchor="middle">3</text>
  <text x="670" y="682" fill="#d97706" font-size="11" text-anchor="middle">Top-K Retrieval</text>

  <rect x="810" y="640" rx="8" ry="8" width="260" height="60" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="940" y="664" fill="#6b21a8" font-size="16" font-weight="700" text-anchor="middle">Cos</text>
  <text x="940" y="682" fill="#8b5cf6" font-size="11" text-anchor="middle">Cosine Distance</text>
</svg>