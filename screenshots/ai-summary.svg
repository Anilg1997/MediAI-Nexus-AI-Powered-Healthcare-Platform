<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d6efd"/><stop offset="100%" stop-color="#0a58ca"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1100" height="750" fill="#f8f9fa"/>

  <!-- Navbar -->
  <rect width="1100" height="56" fill="#212529"/>
  <text x="24" y="36" fill="white" font-size="20" font-weight="700">🏥 MediAI Nexus</text>
  <rect x="900" y="14" rx="4" ry="4" width="60" height="28" fill="#0d6efd"/><text x="930" y="33" fill="white" font-size="12" text-anchor="middle">Dashboard</text>
  <rect x="968" y="14" rx="4" ry="4" width="60" height="28" fill="#198754"/><text x="998" y="33" fill="white" font-size="12" text-anchor="middle">Profile</text>
  <rect x="1036" y="14" rx="4" ry="4" width="50" height="28" fill="#dc3545"/><text x="1061" y="33" fill="white" font-size="12" text-anchor="middle">Logout</text>

  <!-- Main content -->
  <rect x="30" y="72" rx="10" ry="10" width="1040" height="55" fill="white" filter="url(#shadow)"/>
  <text x="50" y="96" fill="#1e293b" font-size="20" font-weight="700">📝 AI Medical Report Summary</text>
  <text x="50" y="116" fill="#64748b" font-size="12">Automatically summarize medical reports into patient-friendly language</text>

  <!-- Input section -->
  <rect x="30" y="140" rx="10" ry="10" width="500" height="400" fill="white" filter="url(#shadow)"/>
  <text x="50" y="168" fill="#1e293b" font-size="15" font-weight="600">Enter Medical Report</text>
  <text x="50" y="188" fill="#64748b" font-size="12">Paste or type the medical report content below</text>

  <rect x="50" y="210" rx="8" ry="8" width="460" height="220" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="65" y="240" fill="#94a3b8" font-size="12">Patient Name: John Smith</text>
  <text x="65" y="262" fill="#94a3b8" font-size="12">Date: June 15, 2025</text>
  <text x="65" y="284" fill="#94a3b8" font-size="12">Report Type: Complete Blood Count</text>
  <text x="65" y="310" fill="#94a3b8" font-size="12">Results:</text>
  <text x="65" y="330" fill="#475569" font-size="12">- WBC: 8,500 /μL (Normal: 4,500-11,000)</text>
  <text x="65" y="350" fill="#475569" font-size="12">- RBC: 5.2 M/μL (Normal: 4.5-5.9)</text>
  <text x="65" y="370" fill="#475569" font-size="12">- Hemoglobin: 15.2 g/dL (Normal: 13.5-17.5)</text>
  <text x="65" y="390" fill="#475569" font-size="12">- Platelets: 250,000 /μL (Normal: 150,000-400,000)</text>
  <text x="65" y="410" fill="#475569" font-size="12">All values within normal range.</text>

  <rect x="180" y="445" rx="8" ry="8" width="200" height="42" fill="url(#aiGrad)"/>
  <text x="280" y="470" fill="white" font-size="14" font-weight="600" text-anchor="middle">🤖 Generate Summary</text>

  <!-- Output section -->
  <rect x="560" y="140" rx="10" ry="10" width="510" height="400" fill="white" filter="url(#shadow)"/>
  <text x="580" y="168" fill="#1e293b" font-size="15" font-weight="600">📋 AI Summary</text>
  <text x="580" y="188" fill="#64748b" font-size="12">Patient-friendly summary generated by AI</text>

  <rect x="580" y="210" rx="8" ry="8" width="470" height="300" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="600" y="238" fill="#6b21a8" font-size="13" font-weight="600">🔬 Blood Test Summary for John Smith</text>

  <text x="600" y="265" fill="#475569" font-size="12" font-weight="600">1. Main Findings</text>
  <text x="600" y="283" fill="#64748b" font-size="11">All blood test results are within normal ranges.</text>
  <text x="600" y="299" fill="#64748b" font-size="11">No abnormal values detected.</text>

  <text x="600" y="322" fill="#475569" font-size="12" font-weight="600">2. Important Observations</text>
  <text x="600" y="340" fill="#64748b" font-size="11">Complete blood count shows healthy levels across</text>
  <text x="600" y="356" fill="#64748b" font-size="11">all parameters including white blood cells, red</text>
  <text x="600" y="372" fill="#64748b" font-size="11">blood cells, hemoglobin, and platelets.</text>

  <text x="600" y="395" fill="#475569" font-size="12" font-weight="600">3. Patient-Friendly Summary</text>
  <text x="600" y="413" fill="#64748b" font-size="11">Your blood test results are normal. You have healthy</text>
  <text x="600" y="429" fill="#64748b" font-size="11">levels of red and white blood cells, and your clotting</text>
  <text x="600" y="445" fill="#64748b" font-size="11">cells (platelets) are at a good level. No concerns.</text>

  <rect x="600" y="465" rx="4" ry="4" width="100" height="26" fill="#0d6efd"/>
  <text x="650" y="483" fill="white" font-size="11" text-anchor="middle">📥 Download</text>
  <rect x="715" y="465" rx="4" ry="4" width="100" height="26" fill="#198754"/>
  <text x="765" y="483" fill="white" font-size="11" text-anchor="middle">📧 Share</text>

  <!-- Info strip -->
  <rect x="30" y="560" rx="10" ry="10" width="1040" height="55" fill="white" filter="url(#shadow)"/>
  <text x="50" y="584" fill="#475569" font-size="12" font-weight="600">ℹ️ How it works</text>
  <text x="50" y="602" fill="#64748b" font-size="11">1. Enter or paste medical report content → 2. Click "Generate Summary" → 3. AI analyzes and summarizes the report → 4. View patient-friendly explanation</text>

  <!-- Feature cards -->
  <rect x="30" y="630" rx="8" ry="8" width="240" height="70" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="150" y="656" fill="#1e40af" font-size="14" font-weight="600" text-anchor="middle">🔍 Findings Extraction</text>
  <text x="150" y="676" fill="#3b82f6" font-size="11" text-anchor="middle">Automatically extracts key findings</text>

  <rect x="290" y="630" rx="8" ry="8" width="240" height="70" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="410" y="656" fill="#166534" font-size="14" font-weight="600" text-anchor="middle">📖 Simple Language</text>
  <text x="410" y="676" fill="#22c55e" font-size="11" text-anchor="middle">Converts medical jargon to plain English</text>

  <rect x="550" y="630" rx="8" ry="8" width="240" height="70" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="670" y="656" fill="#92400e" font-size="14" font-weight="600" text-anchor="middle">⚡ Instant Results</text>
  <text x="670" y="676" fill="#d97706" font-size="11" text-anchor="middle">Powered by Llama 3 via Ollama</text>

  <rect x="810" y="630" rx="8" ry="8" width="260" height="70" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="940" y="656" fill="#6b21a8" font-size="14" font-weight="600" text-anchor="middle">🔒 HIPAA Compliant</text>
  <text x="940" y="676" fill="#8b5cf6" font-size="11" text-anchor="middle">Secure & private data processing</text>
</svg>