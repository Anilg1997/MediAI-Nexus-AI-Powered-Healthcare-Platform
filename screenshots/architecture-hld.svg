<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8"/><stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="aiSubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/></filter>
    <filter id="shadowLight"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/></filter>
    <marker id="arrowBlack" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="38" fill="#1e293b" font-size="22" font-weight="700" text-anchor="middle">MediAI Nexus — High Level Architecture (HLD)</text>
  <line x1="200" y1="50" x2="1000" y2="50" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Layer 1: Client -->
  <rect x="440" y="68" rx="10" ry="10" width="320" height="52" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <text x="600" y="92" fill="white" font-size="15" font-weight="600" text-anchor="middle">🌐 Client Layer</text>
  <text x="600" y="110" fill="#c7d2fe" font-size="11" text-anchor="middle">Web Browser (Angular 21) | Mobile</text>

  <!-- Arrow down -->
  <line x1="600" y1="120" x2="600" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrowBlack)"/>

  <!-- Layer 2: API Gateway -->
  <rect x="380" y="155" rx="10" ry="10" width="440" height="52" fill="url(#gatewayGrad)" filter="url(#shadow)"/>
  <text x="600" y="179" fill="white" font-size="15" font-weight="600" text-anchor="middle">🚪 API Gateway (Spring Cloud Gateway — Port 8080)</text>
  <text x="600" y="197" fill="#bae6fd" font-size="11" text-anchor="middle">Authentication | Rate Limiting | Routing | Load Balancing | CORS</text>

  <!-- Arrow down from gateway -->
  <line x1="600" y1="207" x2="600" y2="235" stroke="#475569" stroke-width="2" marker-end="url(#arrowBlack)"/>

  <!-- Layer 3: Microservices Layer -->
  <rect x="60" y="240" rx="10" ry="10" width="1080" height="240" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="600" y="262" fill="#1e293b" font-size="14" font-weight="600" text-anchor="middle">⚙️ Service Layer — 11 Microservices</text>

  <!-- Row 1: Core services -->
  <rect x="90" y="278" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="167" y="298" fill="white" font-size="12" font-weight="600" text-anchor="middle">🔐 Auth Service</text>
  <text x="167" y="314" fill="#d1fae5" font-size="10" text-anchor="middle">JWT · RBAC · Login</text>

  <rect x="260" y="278" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="337" y="298" fill="white" font-size="12" font-weight="600" text-anchor="middle">👤 Patient Service</text>
  <text x="337" y="314" fill="#d1fae5" font-size="10" text-anchor="middle">CRUD · Search · Profile</text>

  <rect x="430" y="278" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="507" y="298" fill="white" font-size="12" font-weight="600" text-anchor="middle">👨‍⚕️ Doctor Service</text>
  <text x="507" y="314" fill="#d1fae5" font-size="10" text-anchor="middle">CRUD · Specialization</text>

  <rect x="600" y="278" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="677" y="298" fill="white" font-size="12" font-weight="600" text-anchor="middle">📅 Appointment</text>
  <text x="677" y="314" fill="#d1fae5" font-size="10" text-anchor="middle">Schedule · Status · Track</text>

  <rect x="770" y="278" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="847" y="298" fill="white" font-size="12" font-weight="600" text-anchor="middle">💊 Prescription</text>
  <text x="847" y="314" fill="#d1fae5" font-size="10" text-anchor="middle">Create · Track · History</text>

  <rect x="940" y="278" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="1017" y="298" fill="white" font-size="12" font-weight="600" text-anchor="middle">📋 Medical Record</text>
  <text x="1017" y="314" fill="#d1fae5" font-size="10" text-anchor="middle">History · Clinical Notes</text>

  <!-- Row 2: More services -->
  <rect x="90" y="338" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="167" y="358" fill="white" font-size="12" font-weight="600" text-anchor="middle">🧪 Lab Service</text>
  <text x="167" y="374" fill="#d1fae5" font-size="10" text-anchor="middle">Reports · Results</text>

  <rect x="260" y="338" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="337" y="358" fill="white" font-size="12" font-weight="600" text-anchor="middle">📁 File Service</text>
  <text x="337" y="374" fill="#d1fae5" font-size="10" text-anchor="middle">Upload · Storage</text>

  <rect x="430" y="338" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="507" y="358" fill="white" font-size="12" font-weight="600" text-anchor="middle">💳 Payment Service</text>
  <text x="507" y="374" fill="#d1fae5" font-size="10" text-anchor="middle">Billing · Transactions</text>

  <rect x="600" y="338" rx="8" ry="8" width="155" height="44" fill="url(#aiGrad)"/>
  <text x="677" y="358" fill="white" font-size="12" font-weight="600" text-anchor="middle">🤖 AI Service</text>
  <text x="677" y="374" fill="#fef3c7" font-size="10" text-anchor="middle">RAG · Agent · Agentic AI</text>

  <rect x="770" y="338" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="847" y="358" fill="white" font-size="12" font-weight="600" text-anchor="middle">📊 Report Service</text>
  <text x="847" y="374" fill="#d1fae5" font-size="10" text-anchor="middle">Analytics · Summary</text>

  <rect x="940" y="338" rx="8" ry="8" width="155" height="44" fill="url(#serviceGrad)"/>
  <text x="1017" y="358" fill="white" font-size="12" font-weight="600" text-anchor="middle">🔄 Notification</text>
  <text x="1017" y="374" fill="#d1fae5" font-size="10" text-anchor="middle">Email · SMS · Alerts</text>

  <!-- Arrow down from services -->
  <line x1="300" y1="480" x2="300" y2="510" stroke="#475569" stroke-width="2" marker-end="url(#arrowBlack)"/>
  <line x1="600" y1="480" x2="600" y2="510" stroke="#475569" stroke-width="2" marker-end="url(#arrowBlack)"/>
  <line x1="900" y1="480" x2="900" y2="510" stroke="#475569" stroke-width="2" marker-end="url(#arrowBlack)"/>

  <!-- Layer 4: Infrastructure -->
  <rect x="60" y="515" rx="10" ry="10" width="1080" height="200" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="600" y="538" fill="#1e293b" font-size="14" font-weight="600" text-anchor="middle">🗄️ Data & Infrastructure Layer</text>

  <!-- Sub-box: AI Infrastructure -->
  <rect x="90" y="555" rx="8" ry="8" width="300" height="140" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="240" y="575" fill="#6b21a8" font-size="13" font-weight="600" text-anchor="middle">🤖 AI Infrastructure</text>

  <rect x="105" y="588" rx="6" ry="6" width="125" height="36" fill="url(#aiSubGrad)"/>
  <text x="167" y="605" fill="white" font-size="11" font-weight="500" text-anchor="middle">Ollama (Llama 3)</text>
  <text x="167" y="618" fill="#e9d5ff" font-size="9" text-anchor="middle">Local LLM</text>

  <rect x="245" y="588" rx="6" ry="6" width="125" height="36" fill="url(#aiSubGrad)"/>
  <text x="307" y="605" fill="white" font-size="11" font-weight="500" text-anchor="middle">pgvector</text>
  <text x="307" y="618" fill="#e9d5ff" font-size="9" text-anchor="middle">Vector DB · 768d</text>

  <rect x="105" y="636" rx="6" ry="6" width="125" height="36" fill="url(#aiSubGrad)"/>
  <text x="167" y="653" fill="white" font-size="11" font-weight="500" text-anchor="middle">MCP Server</text>
  <text x="167" y="666" fill="#e9d5ff" font-size="9" text-anchor="middle">Tool Functions</text>

  <rect x="245" y="636" rx="6" ry="6" width="125" height="36" fill="url(#aiSubGrad)"/>
  <text x="307" y="653" fill="white" font-size="11" font-weight="500" text-anchor="middle">LangChain4j</text>
  <text x="307" y="666" fill="#e9d5ff" font-size="9" text-anchor="middle">AI Orchestration</text>

  <!-- Sub-box: Database -->
  <rect x="410" y="555" rx="8" ry="8" width="300" height="140" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="560" y="575" fill="#166534" font-size="13" font-weight="600" text-anchor="middle">💾 Database Layer</text>

  <rect x="425" y="588" rx="6" ry="6" width="270" height="36" fill="url(#serviceGrad)"/>
  <text x="560" y="605" fill="white" font-size="11" font-weight="500" text-anchor="middle">PostgreSQL (pgvector)</text>
  <text x="560" y="618" fill="#d1fae5" font-size="9" text-anchor="middle">Relational + Vector Search</text>

  <rect x="425" y="636" rx="6" ry="6" width="270" height="36" fill="url(#serviceGrad)"/>
  <text x="560" y="653" fill="white" font-size="11" font-weight="500" text-anchor="middle">Document Store (TEXT)</text>
  <text x="560" y="666" fill="#d1fae5" font-size="9" text-anchor="middle">Medical Records · Reports</text>

  <!-- Sub-box: Messaging -->
  <rect x="730" y="555" rx="8" ry="8" width="380" height="140" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="920" y="575" fill="#9a3412" font-size="13" font-weight="600" text-anchor="middle">📨 Messaging & Monitoring</text>

  <rect x="745" y="588" rx="6" ry="6" width="170" height="36" fill="url(#infraGrad)"/>
  <text x="830" y="605" fill="white" font-size="11" font-weight="500" text-anchor="middle">Apache Kafka</text>
  <text x="830" y="618" fill="#fecaca" font-size="9" text-anchor="middle">Event Streaming</text>

  <rect x="925" y="588" rx="6" ry="6" width="170" height="36" fill="url(#infraGrad)"/>
  <text x="1010" y="605" fill="white" font-size="11" font-weight="500" text-anchor="middle">Zookeeper</text>
  <text x="1010" y="618" fill="#fecaca" font-size="9" text-anchor="middle">Coordinator</text>

  <rect x="745" y="636" rx="6" ry="6" width="170" height="36" fill="url(#infraGrad)"/>
  <text x="830" y="653" fill="white" font-size="11" font-weight="500" text-anchor="middle">Docker Compose</text>
  <text x="830" y="666" fill="#fecaca" font-size="9" text-anchor="middle">Container Orchestration</text>

  <rect x="925" y="636" rx="6" ry="6" width="170" height="36" fill="url(#infraGrad)"/>
  <text x="1010" y="653" fill="white" font-size="11" font-weight="500" text-anchor="middle">Spring Actuator</text>
  <text x="1010" y="666" fill="#fecaca" font-size="9" text-anchor="middle">Health Monitoring</text>

  <!-- Layer 4: DevOps / Deployment -->
  <rect x="200" y="740" rx="10" ry="10" width="800" height="48" fill="#1e293b" filter="url(#shadow)"/>
  <text x="600" y="762" fill="white" font-size="14" font-weight="600" text-anchor="middle">🐳 Docker Compose | AWS EC2 (Planned) | Kubernetes (Planned) | GitHub Actions (Planned)</text>
  <text x="600" y="780" fill="#94a3b8" font-size="11" text-anchor="middle">Containerization · Cloud Deployment · CI/CD Pipeline · Monitoring</text>

  <!-- Flow lines -->
  <text x="340" y="500" fill="#64748b" font-size="10" text-anchor="middle">Data flow</text>
  <text x="640" y="500" fill="#64748b" font-size="10" text-anchor="middle">AI flow</text>
  <text x="940" y="500" fill="#64748b" font-size="10" text-anchor="middle">Event flow</text>

  <!-- Legends -->
  <rect x="60" y="810" rx="6" ry="6" width="14" height="14" fill="url(#serviceGrad)"/>
  <text x="80" y="822" fill="#475569" font-size="11">Core Services</text>
  <rect x="200" y="810" rx="6" ry="6" width="14" height="14" fill="url(#aiGrad)"/>
  <text x="220" y="822" fill="#475569" font-size="11">AI Services</text>
  <rect x="340" y="810" rx="6" ry="6" width="14" height="14" fill="url(#aiSubGrad)"/>
  <text x="360" y="822" fill="#475569" font-size="11">AI Infrastructure</text>
  <rect x="520" y="810" rx="6" ry="6" width="14" height="14" fill="url(#infraGrad)"/>
  <text x="540" y="822" fill="#475569" font-size="11">Infrastructure</text>
  <rect x="700" y="810" rx="6" ry="6" width="14" height="14" fill="url(#clientGrad)"/>
  <text x="720" y="822" fill="#475569" font-size="11">Client</text>
  <rect x="840" y="810" rx="6" ry="6" width="14" height="14" fill="url(#gatewayGrad)"/>
  <text x="860" y="822" fill="#475569" font-size="11">API Gateway</text>
</svg>