<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d6efd"/><stop offset="100%" stop-color="#0a58ca"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1100" height="750" fill="#f8f9fa"/>

  <!-- Navbar -->
  <rect width="1100" height="56" fill="#212529"/>
  <text x="24" y="36" fill="white" font-size="20" font-weight="700">🏥 AI Healthcare</text>
  <rect x="920" y="14" rx="6" ry="6" width="70" height="28" fill="#0d6efd"/>
  <text x="955" y="33" fill="white" font-size="13" text-anchor="middle" font-weight="500">Login</text>
  <rect x="998" y="14" rx="6" ry="6" width="80" height="28" fill="#198754"/>
  <text x="1038" y="33" fill="white" font-size="13" text-anchor="middle" font-weight="500">Register</text>

  <!-- Login Card -->
  <rect x="350" y="100" rx="12" ry="12" width="400" height="380" fill="white" filter="url(#shadow)"/>
  <text x="550" y="148" fill="#0d6efd" font-size="24" font-weight="700" text-anchor="middle">🏥 Login</text>
  <text x="550" y="172" fill="#6c757d" font-size="13" text-anchor="middle">Sign in to your healthcare account</text>

  <!-- Email -->
  <rect x="380" y="196" rx="8" ry="8" width="340" height="48" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="396" y="212" fill="#6c757d" font-size="11">Enter Email</text>
  <text x="396" y="232" fill="#212529" font-size="14">admin@healthcare.com</text>

  <!-- Password -->
  <rect x="380" y="256" rx="8" ry="8" width="340" height="48" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="396" y="272" fill="#6c757d" font-size="11">Enter Password</text>
  <text x="396" y="292" fill="#212529" font-size="14">••••••••</text>

  <!-- Login button -->
  <rect x="380" y="320" rx="8" ry="8" width="340" height="44" fill="url(#heroGrad)"/>
  <text x="550" y="348" fill="white" font-size="15" font-weight="600" text-anchor="middle">Login</text>

  <!-- Register link -->
  <text x="550" y="400" fill="#6c757d" font-size="13" text-anchor="middle">Don't have an account?</text>
  <text x="550" y="424" fill="#0d6efd" font-size="13" font-weight="600" text-anchor="middle" text-decoration="underline">Create Account</text>
</svg>
