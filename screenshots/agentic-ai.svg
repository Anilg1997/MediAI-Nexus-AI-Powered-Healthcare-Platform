<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="userMsgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d6efd"/><stop offset="100%" stop-color="#0a58ca"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1100" height="750" fill="#f8f9fa"/>

  <!-- Navbar -->
  <rect width="1100" height="56" fill="#212529"/>
  <text x="24" y="36" fill="white" font-size="20" font-weight="700">🏥 MediAI Nexus</text>
  <rect x="900" y="14" rx="4" ry="4" width="60" height="28" fill="#0d6efd"/><text x="930" y="33" fill="white" font-size="12" text-anchor="middle">Dashboard</text>
  <rect x="968" y="14" rx="4" ry="4" width="60" height="28" fill="#198754"/><text x="998" y="33" fill="white" font-size="12" text-anchor="middle">Profile</text>
  <rect x="1036" y="14" rx="4" ry="4" width="50" height="28" fill="#dc3545"/><text x="1061" y="33" fill="white" font-size="12" text-anchor="middle">Logout</text>

  <!-- Main content -->
  <rect x="30" y="72" rx="10" ry="10" width="1040" height="55" fill="white" filter="url(#shadow)"/>
  <text x="50" y="96" fill="#1e293b" font-size="20" font-weight="700">🧠 Agentic AI — Multi-Step Reasoning</text>
  <text x="50" y="116" fill="#64748b" font-size="12">Intelligent agent that analyzes, retrieves, and orchestrates complex healthcare workflows</text>

  <!-- Chat area -->
  <rect x="30" y="140" rx="10" ry="10" width="1040" height="430" fill="white" filter="url(#shadow)"/>

  <rect x="30" y="140" rx="10" ry="10" width="1040" height="50" fill="#faf5ff"/>
  <circle cx="60" cy="165" r="16" fill="url(#aiGrad)"/>
  <text x="60" y="170" fill="white" font-size="14" text-anchor="middle" font-weight="600">🧠</text>
  <text x="85" y="162" fill="#6b21a8" font-size="14" font-weight="600">Agentic AI Orchestrator</text>
  <text x="85" y="180" fill="#94a3b8" font-size="11">Tools: Symptom Analyzer · Doctor Search · Records · Scheduling</text>

  <!-- AI message -->
  <rect x="60" y="205" rx="12" ry="12" width="500" height="45" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="78" y="225" fill="#475569" font-size="12">Hello! I'm your intelligent healthcare agent.</text>
  <text x="78" y="242" fill="#64748b" font-size="11">I can perform multi-step tasks to help you. What do you need?</text>

  <!-- User message -->
  <rect x="600" y="265" rx="12" ry="12" width="440" height="50" fill="url(#userMsgGrad)"/>
  <text x="618" y="287" fill="white" font-size="12">I have a fever and headache. Can you help me</text>
  <text x="618" y="305" fill="white" font-size="12">find a doctor and book an appointment?</text>

  <!-- Agent's step-by-step reasoning -->
  <rect x="60" y="330" rx="12" ry="12" width="800" height="200" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>

  <rect x="60" y="330" rx="12" ry="12" width="800" height="22" fill="url(#aiGrad)"/>
  <text x="460" y="345" fill="white" font-size="10" text-anchor="middle">🧠 Agentic AI — Reasoning Steps</text>

  <!-- Step 1 -->
  <rect x="78" y="362" rx="6" ry="6" width="370" height="32" fill="url(#stepGrad)"/>
  <text x="263" y="383" fill="white" font-size="11" text-anchor="middle">Step 1: 🔍 Analyze Symptoms (fever, headache)</text>

  <!-- Step 2 -->
  <rect x="78" y="402" rx="6" ry="6" width="370" height="32" fill="url(#toolGrad)"/>
  <text x="263" y="423" fill="white" font-size="11" text-anchor="middle">Step 2: 👨‍⚕️ Search Available Doctors</text>

  <!-- Step 3 -->
  <rect x="78" y="442" rx="6" ry="6" width="370" height="32" fill="url(#stepGrad)"/>
  <text x="263" y="463" fill="white" font-size="11" text-anchor="middle">Step 3: 📅 Check Appointment Slots</text>

  <!-- Step 4 -->
  <rect x="78" y="482" rx="6" ry="6" width="370" height="32" fill="url(#toolGrad)"/>
  <text x="263" y="503" fill="white" font-size="11" text-anchor="middle">Step 4: ✅ Generate Recommendation</text>

  <!-- Result panel -->
  <rect x="468" y="362" rx="8" ry="8" width="375" height="150" fill="white" stroke="#e9d5ff" stroke-width="1"/>
  <text x="655" y="385" fill="#6b21a8" font-size="13" font-weight="600" text-anchor="middle">📋 Final Recommendation</text>

  <text x="486" y="410" fill="#475569" font-size="12" font-weight="600">Symptoms Assessment:</text>
  <text x="486" y="428" fill="#64748b" font-size="11">Fever + headache likely viral infection.</text>
  <text x="486" y="448" fill="#475569" font-size="12" font-weight="600">Suggested Doctor:</text>
  <text x="486" y="466" fill="#64748b" font-size="11">Dr. Sarah Lee (General Medicine)</text>
  <text x="486" y="486" fill="#475569" font-size="12" font-weight="600">Available Slot:</text>
  <text x="486" y="504" fill="#64748b" font-size="11">Tomorrow, June 21 @ 10:00 AM</text>

  <!-- Input -->
  <rect x="60" y="548" rx="8" ry="8" width="850" height="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="78" y="574" fill="#94a3b8" font-size="13">Describe your medical need — the agent will handle the rest...</text>
  <rect x="930" y="548" rx="8" ry="8" width="120" height="46" fill="url(#aiGrad)"/>
  <text x="990" y="575" fill="white" font-size="14" font-weight="600" text-anchor="middle">Send →</text>

  <!-- Info -->
  <rect x="30" y="600" rx="10" ry="10" width="1040" height="55" fill="white" filter="url(#shadow)"/>
  <text x="50" y="624" fill="#475569" font-size="12" font-weight="600">ℹ️ Agentic AI Capabilities</text>
  <text x="50" y="642" fill="#64748b" font-size="11">1. Intent Recognition → 2. Tool Selection → 3. Multi-step Execution → 4. Context Synthesis → 5. Personalized Recommendation</text>

  <!-- Tools -->
  <rect x="30" y="670" rx="8" ry="8" width="190" height="55" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="125" y="693" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">🔍 Symptom Analyzer</text>
  <text x="125" y="710" fill="#3b82f6" font-size="10" text-anchor="middle">Analyze medical symptoms</text>

  <rect x="240" y="670" rx="8" ry="8" width="190" height="55" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="335" y="693" fill="#166534" font-size="12" font-weight="600" text-anchor="middle">👨‍⚕️ Doctor Search</text>
  <text x="335" y="710" fill="#22c55e" font-size="10" text-anchor="middle">Find matching doctors</text>

  <rect x="450" y="670" rx="8" ry="8" width="190" height="55" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="545" y="693" fill="#92400e" font-size="12" font-weight="600" text-anchor="middle">📅 Appointment Mgmt</text>
  <text x="545" y="710" fill="#d97706" font-size="10" text-anchor="middle">Book appointments</text>

  <rect x="660" y="670" rx="8" ry="8" width="190" height="55" fill="#fce7f3" stroke="#fbcfe8" stroke-width="1"/>
  <text x="755" y="693" fill="#831843" font-size="12" font-weight="600" text-anchor="middle">📋 Records Access</text>
  <text x="755" y="710" fill="#db2777" font-size="10" text-anchor="middle">Retrieve medical records</text>

  <rect x="870" y="670" rx="8" ry="8" width="200" height="55" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="970" y="693" fill="#6b21a8" font-size="12" font-weight="600" text-anchor="middle">⚡ Prescription Analyze</text>
  <text x="970" y="710" fill="#8b5cf6" font-size="10" text-anchor="middle">Analyze prescriptions</text>
</svg>